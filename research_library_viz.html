 from preserving memory channels while still supplying nonlinear features. Its evidence is a combination of mathematical explanation and benchmark-driven simulation.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The important lesson is that good reservoirs do not necessarily maximize one property uniformly; they may benefit from internal specialization. Mixing node types is one way to escape a crude all-memory or all-nonlinearity compromise. The main limitation is that the optimal mixture is task dependent and the paper does not provide a universal prescription for physical implementations. The idea is strong, but its substrate-specific realization remains open.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can physical reservoirs be deliberately partitioned into memory-dominant and transformation-dominant regions that are tunable without losing hardware simplicity?</p>"}, {"citation_key": "Urbain2017morphological", "title": "Morphological Properties of Mass-Spring Networks for Optimal Locomotion Learning", "authors": "Urbain et al.", "year": 2017, "paper_type": "simulation", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "morphological-computation", "robot-learning"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Urbain2017morphological — Morphological Properties of Mass-Spring Networks for Optimal Locomotion Learning</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper examines how morphology influences locomotion learning in mass-spring robots. It argues that body size, compliance, and resonant frequency shape the ease with which learned controllers can exploit the body's dynamics. The contribution is a morphology-centered analysis of when soft structures support or hinder locomotor learning. It ties reservoir-like body dynamics to concrete movement outcomes.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors simulate mass-spring networks under locomotion tasks, comparing open-loop behavior and closed-loop learning with FORCE-style training. They vary morphology and analyze how the resulting dynamics affect limit cycles, movement robustness, and training performance. Larger or appropriately compliant structures can produce more favorable locomotion characteristics in the reported settings. The evidence is computational, with emphasis on controlled morphology comparisons.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that learning performance depends on the physics of the body, not just on the learning rule layered on top of it. Compliance and resonance can become assets when matched to the control objective. The main limitation is that the conclusions come from simulated mass-spring systems and may shift when fabrication, friction, sensing, and actuator saturation are introduced. The paper clarifies a design direction rather than final robot hardware guidance.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can morphology search identify bodies that are simultaneously locomotion-efficient and computationally expressive across several tasks instead of one learned behavior?</p>"}, {"citation_key": "Nakajima2014exploiting", "title": "Exploiting Short-Term Memory in Soft Body Dynamics as a Computational Resource", "authors": "Nakajima et al.", "year": 2014, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "soft-robotics", "morphological-computation", "embodied-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Nakajima2014exploiting — Exploiting Short-Term Memory in Soft Body Dynamics as a Computational Resource</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper demonstrates that a soft body can provide usable short-term memory and nonlinear information processing for computation and control. Using an octopus-inspired arm, the authors treat body dynamics as a physical reservoir rather than as an object requiring complete digital modeling. The contribution is an influential experimental proof that soft morphology itself can serve as a computational resource. It makes the abstract idea of morphological computation operational on real hardware.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The study evaluates memory-related behavior and N-bit parity tasks from sensed soft-body states, then uses the same reservoir concept in timing and closed-loop control demonstrations. The authors vary motion timescales and show that computational capability depends strongly on how the input dynamics interact with the body's natural response. Their physical experiments indicate that the arm can support temporal processing relevant to behavior generation. The evidence combines capacity-style tests with embodied robotic tasks.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main lesson is that a compliant body can store a recent input trace in its deformation history and expose that trace through sensors. That makes body dynamics potentially useful for low-complexity controllers. The limitation is that the observed capability is highly dependent on timescale, sensing, and the specific soft mechanism used. The paper establishes a landmark example, but not a universal morphology recipe.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How can one predict the timescale match between an intended task and a soft body's intrinsic memory before building the robot?</p>"}, {"citation_key": "Zhao2013spine", "title": "Spine Dynamics as a Computational Resource in Spine-Driven Quadruped Locomotion", "authors": "Zhao et al.", "year": 2013, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "soft-robotics", "morphological-computation", "embodied-intelligence", "robot-learning"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Zhao2013spine — Spine Dynamics as a Computational Resource in Spine-Driven Quadruped Locomotion</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper demonstrates that the compliant spine of a quadruped robot can act as a computational resource for gait generation. The robot \"Kitty\" uses sensed spine dynamics together with simple linear readouts to produce bounding, trotting, and turning behaviors. The contribution is a real embodied implementation of morphological computation in locomotion. It shows that complex body dynamics can participate directly in closed-loop control.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors instrument an actuated multi-joint silicone spine with force sensors, collect sensory dynamics during teaching, fit linear readout weights, and feed the resulting outputs back into motor commands. Experiments show periodic control signals and corresponding gait patterns for several target behaviors. They also apply strong external load perturbations and report that the learned locomotion recovers after the disturbance is removed. The evidence is physical robot behavior under both nominal and perturbed conditions.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that morphology can encode reusable control structure: the learned behavior is stored in a light readout over rich body dynamics rather than in a heavily engineered centralized controller. This is one of the clearer real-robot demonstrations of reservoir-style body computation. The main limitation is that the platform introduces physical constraints such as actuator heating, terrain sensitivity, and phase-shifted outputs that complicate clean quantitative evaluation. The paper proves feasibility more than mature locomotion performance.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How can morphology-based locomotion controllers be made robust across changing terrain and long operating times without losing the simplicity that gives them appeal?</p>"}, {"citation_key": "Dambre2012information", "title": "Information Processing Capacity of Dynamical Systems", "authors": "Dambre et al.", "year": 2012, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "memory-capacity", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Dambre2012information — Information Processing Capacity of Dynamical Systems</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper defines a general information processing capacity for dynamical systems driven by inputs. It shows how total accessible computation can be decomposed across orthogonal functions of past inputs, making the balance between memory and nonlinear transformation explicit. The central theoretical result is that total capacity is bounded by the number of linearly independent observable state variables and reaches that bound under suitable conditions. This gives reservoir computing a sharper systems-level capacity language.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors construct a function basis using orthogonal polynomials and quantify how well a linear readout can reconstruct each target function from system states. They prove capacity bounds and then illustrate the decomposition numerically on example dynamical systems, including the effect of noise. The paper distinguishes capacity spent on direct memory from capacity spent on nonlinear combinations of earlier inputs. The evidence is mainly analytical, supported by controlled computational examples.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that a reservoir's computational budget is finite and can be allocated differently across memory and nonlinear processing. This framework is useful because it evaluates latent capability rather than a single task score. Its main limitation is practical: capacity decompositions can become expensive or unwieldy for large task spaces, and the link from capacity profile to best hardware design is not automatic. The paper supplies a rigorous diagnostic, not a direct engineering optimizer.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How can information processing capacity be turned into a tractable design objective for real physical reservoirs with partial observability and measurement noise?</p>"}, {"citation_key": "Hauser2012the", "title": "The Role of Feedback in Morphological Computation with Compliant Bodies", "authors": "Hauser et al.", "year": 2012, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "morphological-computation", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Hauser2012the — The Role of Feedback in Morphological Computation with Compliant Bodies</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper extends the theory of morphological computation by showing why feedback is crucial when compliant bodies are used to generate autonomous behavior. It argues that rich body dynamics plus simple feedback can create stable periodic patterns and multiple attractors useful for locomotion-like tasks. The contribution is a bridge from passive body-as-filter arguments toward closed-loop behavior generation. It clarifies how reservoirs embedded in bodies can participate in control, not just signal transformation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors analyze feedback-connected compliant systems and simulate nonlinear mass-spring bodies with trainable readouts fed back into actuation. They show that the resulting closed-loop system can generate stable limit cycles and switch among different autonomous patterns when trained appropriately. The paper emphasizes that linear feedback can be sufficient when the underlying body dynamics are already nonlinear and high dimensional. Its support comes from theory-guided numerical demonstrations rather than physical hardware experiments.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that feedback turns morphological computation from a passive mapping mechanism into an autonomous behavior generator. That distinction matters for embodied systems that need sustained rhythmic motion or attractor-like control. The main limitation is that stability, actuation delay, and sensing imperfections are treated more cleanly than they would appear in real compliant machines. The paper supplies a conceptual control principle that still requires experimental stress testing.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How robust are feedback-generated morphological attractors once physical compliance, actuator limits, and environmental contact all vary at the same time?</p>"}, {"citation_key": "Appeltant2011information", "title": "Information Processing Using a Single Dynamical Node as Complex System", "authors": "Appeltant et al.", "year": 2011, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Appeltant2011information — Information Processing Using a Single Dynamical Node as Complex System</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper shows that a reservoir computer does not need a large recurrent network of physical nodes: a single nonlinear node with delayed feedback can emulate a high-dimensional reservoir through time multiplexing. The authors reinterpret sampled points along one delay interval as virtual nodes and train only a linear readout, preserving the reservoir-computing paradigm. Their claim is that delay systems can provide the required nonlinear transformation and fading memory with far simpler hardware. This establishes a practical architecture for physical reservoir computing based on compact delay dynamics.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The system uses a Mackey-Glass-type delayed nonlinear node, masked inputs, and virtual nodes spaced along the delay line. The authors validate the idea experimentally on isolated spoken-digit recognition using an electronic implementation, and numerically on NARMA-10 dynamical system modeling. They report word error rates as low as 0.2% experimentally and 0.14% in simulation for speech recognition, plus NARMA-10 error down to NRMSE = 0.15 under favorable parameter choices. The paper also studies how feedback gain, input gain, delay length, and virtual-node spacing affect performance, showing that the architecture is effective but parameter-sensitive.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that temporal structure can substitute for spatial network size: one delayed physical node can act like many interacting reservoir units. That insight made delay-based physical reservoirs technically attractive because they reduce hardware complexity while retaining competitive benchmark performance. The main limitation is that virtual nodes are fed serially rather than in parallel, which introduces a speed tradeoff relative to conventional node arrays. The results also depend on careful tuning of reservoir parameters and do not by themselves prove task-agnostic optimality.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How far can single-node delay reservoirs be scaled across tasks before serial processing, parameter sensitivity, or memory-performance tradeoffs make multi-node or hybrid physical architectures preferable?</p>"}, {"citation_key": "Hauser2011towards", "title": "Towards a Theoretical Foundation for Morphological Computation with Compliant Bodies", "authors": "Hauser et al.", "year": 2011, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "morphological-computation", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Hauser2011towards — Towards a Theoretical Foundation for Morphological Computation with Compliant Bodies</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper provides a theoretical foundation for treating compliant bodies as computational resources. It argues that a soft or elastic body with suitable dynamics can implement nonlinear fading-memory transformations that are useful for control and signal processing. The central contribution is to connect morphological computation with reservoir-computing theory in a mathematically structured way. This gives later soft-robotics work a principled vocabulary for why body dynamics may support computation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors analyze nonlinear mass-spring systems and explain how their body states can be combined by simple readouts to approximate useful dynamical mappings. Simulation studies show that such systems can emulate target filters and support multiple behaviors from the same underlying compliant structure. The paper emphasizes time invariance, fading memory, and readout simplicity as the important theoretical ingredients. Its evidence is primarily formal argument plus controlled numerical demonstrations.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that compliance can be computationally productive rather than merely a control difficulty. A body with rich internal dynamics may reduce the burden placed on an explicit controller. The main limitation is that the theory is developed largely on stylized simulated systems, so practical issues such as sensing, actuation limits, and environmental disturbance remain outside the central treatment. The paper establishes possibility and structure more than a finished hardware design method.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What physical design principles guarantee that a compliant body will expose the right observable states for reliable computation in real robots?</p>"}, {"citation_key": "Verstraeten2010memory", "title": "Memory versus Non-Linearity in Reservoirs", "authors": "Verstraeten et al.", "year": 2010, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "memory-capacity", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Verstraeten2010memory — Memory versus Non-Linearity in Reservoirs</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper studies how memory and nonlinear transformation compete inside tanh-based reservoir systems. It argues that the right balance is task dependent and cannot be inferred from a single generic tuning heuristic. The contribution is a controlled analysis of how input scaling, spectral radius, and bias shift a reservoir between more memory-oriented and more nonlinear behavior. It gives concrete substance to a tradeoff often referenced abstractly.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors define tasks with independently controlled memory delay and nonlinear demand, then sweep reservoir parameters to identify favorable regions. They analyze how spectral radius, bias, and input scaling interact rather than treating them as isolated knobs. The resulting performance maps show that parameter settings optimal for one computational profile can be poor for another. The evidence is numerical but designed to expose mechanism rather than chase one benchmark maximum.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The important takeaway is that reservoir tuning should begin from the computational structure of the task. High memory and strong nonlinearity pull the reservoir in different directions, and a useful operating point sits between them. The main limitation is that the findings are established on a specific model family and synthetic tasks, so device-specific reservoirs may exhibit additional constraints. Still, the tradeoff logic remains widely relevant.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can reservoir characterization methods estimate the required memory-nonlinearity balance of a new task before expensive parameter sweeps?</p>"}, {"citation_key": "Baraniuk2009random", "title": "Random Projections of Smooth Manifolds", "authors": "Baraniuk and Wakin", "year": 2009, "paper_type": "theory", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "dimensionality-reduction"], "topic": "Methodologies and Techniques", "body_html": "<h2>Baraniuk2009random — Random Projections of Smooth Manifolds</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper proves that random linear projections can preserve the geometry of data lying on a smooth, low-dimensional manifold embedded in a much higher-dimensional ambient space. Its main result extends Johnson-Lindenstrauss-style guarantees from finite point clouds to entire manifolds. The required projected dimension depends primarily on intrinsic manifold dimension and only logarithmically on ambient dimension. This gives a theoretical basis for compressive representations of structured, nonlinear data.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors characterize manifolds through geometric quantities such as intrinsic dimension, volume, and condition number, then derive probabilistic bounds for Gaussian random projections. They show that, with high probability, pairwise Euclidean distances and geodesic distances on the manifold are preserved up to controlled distortion. The proof builds an epsilon-net covering argument over the manifold and lifts pointwise distance preservation to the continuous set. The extracted text frames this as a bridge between compressed sensing ideas and manifold learning.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The important takeaway is that nonlinear low-dimensional structure can survive aggressive random dimensionality reduction when that structure is sufficiently regular. This helps explain why simple random features or measurements can still support downstream inference on manifold-like data. The limitation is that the theorem depends on smoothness and conditioning assumptions that may not hold for arbitrary empirical datasets. It is a guarantee about geometric preservation, not a full recipe for task-optimal embeddings.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How can comparable preservation guarantees be extended to noisy, weakly regular, or only approximately manifold-structured datasets of the kind encountered in practice?</p>"}, {"citation_key": "Sussillo2009generating", "title": "Generating Coherent Patterns of Activity from Chaotic Neural Networks", "authors": "Sussillo and Abbott", "year": 2009, "paper_type": "simulation", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "dynamical-systems"], "topic": "Methodologies and Techniques", "body_html": "<h2>Sussillo2009generating — Generating Coherent Patterns of Activity from Chaotic Neural Networks</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper introduces FORCE learning for training chaotic recurrent neural networks to produce coherent, task-specific outputs. Instead of suppressing recurrence, the method uses initially irregular network activity as a rich substrate and rapidly shapes the readout so output errors stay small during learning. The trained networks generate temporal patterns, respond to inputs, and switch among multiple outputs. The contribution is a practical online learning rule for turning complex recurrent dynamics into controlled behavior.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>FORCE learning uses a recursive least-squares-style update that repeatedly adjusts output weights while feedback remains active. The paper demonstrates generated waveforms, memory-dependent transformations, switching tasks, and motor-like patterns derived from human motion data. The extracted text highlights that the networks begin in a chaotic regime yet can converge to stable task performance once the output error is held in check. The evidence comes from simulation studies across several dynamical tasks.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that high-dimensional recurrent dynamics can be trained by controlling a small supervised interface while leaving the bulk network structure intact. This became influential for later work on recurrent computation and reservoir-adjacent training methods. The limitation is that the results are model-based simulations, and biological plausibility or hardware scalability is not resolved by the paper. Performance also depends on staying in a regime where the initial chaotic dynamics are neither too weak nor too hard to tame.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What aspects of FORCE learning remain effective when recurrent dynamics are constrained by real physical substrates or noisy analog implementations?</p>"}, {"citation_key": "Lukosevicius2009reservoir", "title": "Reservoir Computing Approaches to Recurrent Neural Network Training", "authors": "Lukosevicius and Jaeger", "year": 2009, "paper_type": "review", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Lukosevicius2009reservoir — Reservoir Computing Approaches to Recurrent Neural Network Training</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This review organizes the reservoir computing paradigm as a family of recurrent-network training approaches centered on fixed internal dynamics and trainable readouts. It explains how Echo State Networks, Liquid State Machines, and related methods fit under a shared conceptual umbrella. The contribution is a durable taxonomy of reservoir construction, adaptation, and output training. It also situates reservoir computing against broader recurrent neural network practice of its time.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors synthesize theoretical principles, algorithmic variants, readout choices, and hardware or unconventional realizations reported in the literature. They discuss initialization, spectral scaling, readout fitting, regularization, and known failure modes. The review also compares algorithmic alternatives and identifies when RC is appealing from a training or implementation standpoint. Its support is literature integration rather than a single new experimental system.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The enduring takeaway is that RC succeeds by decoupling temporal feature generation from supervised training complexity. That separation remains central in later software and physical reservoirs. The main limitation is historical scope: the survey predates much of today's physical RC hardware, later theoretical refinements, and current benchmark practices. It is foundational context, not a current census of the field.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Which ideas from the original RC taxonomy remain most predictive for modern physical reservoirs whose constraints differ sharply from software ESNs?</p>"}, {"citation_key": "Lukosevicius2012a", "title": "Reservoir Computing Approaches to Recurrent Neural Network Training", "authors": "Lukosevicius and Jaeger", "year": 2009, "paper_type": "review", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Lukosevicius2012a — Reservoir Computing Approaches to Recurrent Neural Network Training</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The extracted PDF is the reservoir-computing survey by Lukosevicius and Jaeger that reviews recurrent-network training through fixed reservoirs and learned readouts. It presents the field's core conceptual vocabulary, including Echo State Networks, Liquid State Machines, readout learning, and reservoir configuration. The contribution of the PDF itself is therefore a broad organizing review rather than a narrower 2012-specific paper. The folder key does not match the year visible in the extracted source, so this note follows the PDF content.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors synthesize prior work on reservoir initialization, training procedures, theoretical conditions, and representative applications. They compare model families and discuss why reservoir computing simplified recurrent training relative to end-to-end optimization. The review also surveys hardware and unconventional reservoirs that were visible at the time. The evidence is a literature synthesis across methods and reported demonstrations.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is the same one that made RC influential: leave the recurrent dynamics largely fixed, then train a simple output layer against the task. That perspective still underlies a large fraction of physical-reservoir research. The limitation here is twofold: the source is an older survey, and the extracted PDF metadata appears mismatched with the folder citation key. This note is reliable about the PDF's content, but the library citation metadata deserves later cleanup.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Should this folder be relabeled or reconciled against the intended 2012 citation so that the library key matches the actual stored PDF?</p>"}, {"citation_key": "Verstraeten2005isolated", "title": "Isolated Word Recognition with the Liquid State Machine: A Case Study", "authors": "Verstraeten et al.", "year": 2005, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "neuromorphic-computing"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Verstraeten2005isolated — Isolated Word Recognition with the Liquid State Machine: A Case Study</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper studies isolated spoken-digit recognition with Liquid State Machines and compares how different auditory front ends affect performance. It shows that the encoding of the input signal can matter as much as the recurrent reservoir itself. The contribution is a case study linking reservoir computing to speech recognition through biologically motivated spike representations. It demonstrates the practical significance of input design in RC systems.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors compare multiple speech encodings, including Hopfield-Brody-style features, MFCC-derived spike conversion, and a cochlea-inspired representation. They feed these encodings into a Liquid State Machine and evaluate recognition accuracy on isolated-word tasks. The biologically motivated cochlear encoding performs best among the tested setups and approaches stronger conventional baselines more closely. The evidence is experimental benchmarking across input pipelines.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that reservoir quality cannot be separated cleanly from input representation quality. A more suitable sensory encoding can substantially improve downstream recognition without redesigning the reservoir core. The main limitation is that the study targets an older, narrow speech-recognition benchmark and does not settle general encoding principles for broader tasks. It is a clear case study, not a comprehensive speech system.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How should input encodings be co-designed with reservoir dynamics so that the reservoir receives the temporal structure it is best suited to exploit?</p>"}, {"citation_key": "Jaeger2004harnessing", "title": "Harnessing Nonlinearity: Predicting Chaotic Systems and Saving Energy in Wireless Communication", "authors": "Jaeger and Haas", "year": 2004, "paper_type": "simulation", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "reservoir-computing", "dynamical-systems"], "topic": "Methodologies and Techniques", "body_html": "<h2>Jaeger2004harnessing — Harnessing Nonlinearity: Predicting Chaotic Systems and Saving Energy in Wireless Communication</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper shows that Echo State Networks can harness rich recurrent nonlinear dynamics while keeping training simple. Instead of adapting all recurrent weights, the method fixes a large dynamic reservoir and trains only a linear readout. Jaeger and Haas use this framework to tackle difficult temporal tasks in chaotic prediction and communication equalization. The work helped establish reservoir computing as a practical alternative to fully trained recurrent neural networks.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The paper formulates the Echo State Network update and trains the output weights with linear regression once reservoir states are collected. It evaluates the method on long-horizon prediction of the Mackey-Glass chaotic system and on compensation of a nonlinear wireless communication channel. The extracted text reports dramatic improvements over comparison baselines, including much lower normalized prediction error and large reductions in symbol error rate. These benchmark results are used as evidence that fixed nonlinear dynamics plus learned readout can be highly effective.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The lasting takeaway is that one can separate temporal richness from trainability: a stable recurrent reservoir supplies nonlinear memory, and a cheap output fit extracts the desired signal. That insight is central to later reservoir-computing work in both software and physical systems. The limitation is that performance depends on reservoir configuration, task regime, and the chosen benchmarks. The paper demonstrates effectiveness, but it does not fully resolve how to design reservoirs systematically for arbitrary tasks.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What reservoir design principles predict when fixed recurrent dynamics will outperform more directly trained temporal models on a given nonlinear task?</p>"}, {"citation_key": "White2004short", "title": "Short-Term Memory in Orthogonal Neural Networks", "authors": "White et al.", "year": 2004, "paper_type": "theory", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "memory-capacity"], "topic": "Methodologies and Techniques", "body_html": "<h2>White2004short — Short-Term Memory in Orthogonal Neural Networks</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper studies how linear recurrent networks store temporal input histories in their transient states. It derives the memory behavior of distributed shift-register architectures and random orthogonal recurrent connectivity, showing that usable memory capacity scales with network size. The contribution is a precise theoretical treatment of short-term memory without relying on attractor-based persistent activity. It directly informs later thinking about reservoir memory and recurrent-state representational capacity.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors define a memory function measuring how well a linear readout reconstructs past scalar inputs from the current network state. They analytically evaluate this quantity for structured and random orthogonal connectivity and analyze the effects of noise and perturbations. Numerical results support the derived memory curves and identify an optimal spectral regime for orthogonal networks. The paper shows that orthogonal recurrence can distribute temporal information efficiently across state dimensions.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that recurrent networks can carry rich short-term memory in transient dynamics, and that orthogonal structure helps preserve that history. Memory capacity need not be understood only through fixed-point or attractor mechanisms. The main limitation is that the analysis focuses on linear recurrent systems, so it does not settle how memory interacts with nonlinear computation in practical reservoirs or biological circuits. It is foundational on memory scaling, but deliberately narrow in dynamical scope.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How should recurrent architectures trade orthogonal memory preservation against the nonlinear transformations required for harder temporal computations?</p>"}, {"citation_key": "Jaeger2001the", "title": "The Echo State Approach to Analysing and Training Recurrent Neural Networks", "authors": "Jaeger", "year": 2001, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Jaeger2001the — The Echo State Approach to Analysing and Training Recurrent Neural Networks</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This foundational report introduces the echo state approach, where a fixed recurrent dynamical system is paired with trainable linear outputs. It formalizes the echo state property and shows why recurrent state trajectories can be useful features for sequence learning. The contribution is the conceptual basis of Echo State Networks and much of later reservoir computing. It changes recurrent training from a full backpropagation problem into a readout-estimation problem.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The report develops the theoretical conditions surrounding state dependence on input history and then demonstrates training procedures on nonlinear sequence tasks. A prominent example is Mackey-Glass prediction, where the approach achieves very strong errors relative to methods discussed in the report. The analysis explains why stable input-driven recurrence can supply rich temporal context while leaving output training simple. The evidence combines mathematical framing, design heuristics, and benchmark experiments.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The lasting takeaway is that a recurrent system can be useful precisely because it is not trained end to end. Fixed dynamics plus linear readout became the template later exploited by software and physical reservoirs alike. The limitation is that deciding when a reservoir truly has a useful echo state property, and how to configure it well, remains more subtle than the core idea first suggests. The report launches the paradigm but does not close the design problem.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What practical diagnostics best determine whether a candidate physical reservoir has the effective echo-state behavior needed for reliable learning?</p>"}, {"citation_key": "Fedder1994simulation", "title": "Simulation of Microelectromechanical Systems", "authors": "Fedder", "year": 1994, "paper_type": "simulation", "read_status": "skimmed", "tags": ["methodologies-and-techniques"], "topic": "Methodologies and Techniques", "body_html": "<h2>Fedder1994simulation — Simulation of Microelectromechanical Systems</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This dissertation develops lumped-parameter simulation methods for microelectromechanical systems and demonstrates how those models can support device design, control, and microassembly. It derives first-order component models for plates, damping, springs, electrostatic actuators, and capacitive sensors, then implements them in SPICE and MATLAB workflows. The thesis also builds and tests an integrated MEMS control platform to verify the models under realistic operating conditions. Its contribution is a foundational modeling toolkit paired with experimental validation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The work derives analytic expressions for several MEMS building blocks and uses them to simulate coupled mechanical-electrical behavior. A suspended polysilicon plate with capacitive sensing and electrostatic feedback actuators is fabricated as a control testbed, including sigma-delta force-balance operation. The thesis reports controlled vertical displacement and tilt, analyzes low-pressure limit-cycle oscillations, and shows that analytic loop models and simulations predict the observed behavior. A separate microassembly study demonstrates fuse-based temporary anchors, configurable springs, and aluminum microbridge welding for prestress and alignment.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that compact physical models can make MEMS systems simulatable at the design and control level without abandoning meaningful device physics. This is valuable because system behavior depends on the interaction of mechanics, sensing, actuation, and electronics. The main limitation is historical and methodological: the models are intentionally low-order and were developed for the fabrication processes and device classes available in the early 1990s. They remain instructive, but modern MEMS platforms may need richer multiphysics treatments.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How should lumped MEMS simulation frameworks be extended today to preserve interpretability while capturing stronger nonlinearities, fabrication variation, and multiphysics coupling?</p>"}, {"citation_key": "Boyd1985fading", "title": "Fading Memory and the Problem of Approximating Nonlinear Operators with Volterra Series", "authors": "Boyd and Chua", "year": 1985, "paper_type": "theory", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "dynamical-systems"], "topic": "Methodologies and Techniques", "body_html": "<h2>Boyd1985fading — Fading Memory and the Problem of Approximating Nonlinear Operators with Volterra Series</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper shows that fading memory is a sufficient structural property for approximating broad classes of nonlinear operators with Volterra-series models. In particular, time-invariant continuous nonlinear operators with fading memory can be uniformly approximated by finite Volterra representations over suitable signal sets. The work also connects these approximants to finite-dimensional linear dynamical systems followed by nonlinear readouts. This makes fading memory a central organizing condition for nonlinear system approximation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>Boyd and Chua formalize fading memory through weighted input norms that discount distant history, then prove approximation results for continuous operators under that topology. They derive both continuous-time Volterra approximants and discrete-time nonlinear moving-average counterparts. The argument improves on earlier finite-horizon or compact-domain results by handling behavior over all time on broader signal classes. The paper is theoretical, with the main evidence carried by constructive approximation theorems.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The paper's enduring point is that finite-history-like nonlinear models are principled when the target system gradually forgets old inputs. That idea later becomes relevant to reservoir computing and other recurrent approximators that rely on stable fading-memory behavior. The main limitation is that the approximation theorems do not by themselves tell a practitioner how large an expansion is needed or how to identify it efficiently from data. Systems without fading memory fall outside the guarantee.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What practical identification procedures can exploit the fading-memory approximation result while controlling model order and sample complexity?</p>"}, {"citation_key": "Schetzen1981nonlinear", "title": "Nonlinear System Modeling Based on the Wiener Theory", "authors": "Schetzen", "year": 1981, "paper_type": "review", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "dynamical-systems"], "topic": "Methodologies and Techniques", "body_html": "<h2>Schetzen1981nonlinear — Nonlinear System Modeling Based on the Wiener Theory</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This tutorial explains nonlinear system modeling through Wiener theory and its relation to Volterra representations. It lays out how nonlinear systems can be decomposed into orthogonal functional components under stochastic excitation. The paper is meant to make Wiener-kernel methods usable for modeling practice, not to introduce a single isolated theorem. Its contribution is a structured account of the theory, estimation methods, and experimental considerations behind Wiener models.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>Schetzen reviews the Wiener series, its relationship to Volterra kernels, and identification procedures under white Gaussian, nonwhite Gaussian, and some non-Gaussian inputs. The extracted text discusses cross-correlation methods for estimating Wiener kernels and introduces measurement stability to reason about error in experimentally obtained models. Worked derivations and comparisons among excitation cases serve as the paper's evidence. The article is therefore methodological and expository rather than experimental in the modern benchmark sense.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The enduring takeaway is that Wiener theory offers a principled, orthogonal expansion for nonlinear system identification when the excitation assumptions are appropriate. It also clarifies why input statistics matter to kernel estimation and model interpretation. The limitation is that practical usefulness depends on whether the target system fits the representation assumptions and whether higher-order kernels can be estimated stably. Complexity grows quickly as nonlinear order increases.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How can Wiener-style nonlinear identification remain tractable for high-dimensional systems without losing the interpretability that made the framework attractive?</p>"}];

// ── Topic colour palette (VT-inspired) ───────────────────────
const TOPIC_PALETTES = [
  {bg:'#f5e9ec',color:'#861F41',border:'#d4a0b0',dot:'#861F41'},   // maroon
  {bg:'#fef0e4',color:'#b85500',border:'#f0c090',dot:'#E5751F'},   // orange
  {bg:'#e8f1f9',color:'#2d5f8a',border:'#9bbdd9',dot:'#4A7FB5'},   // blue
  {bg:'#e6f4f3',color:'#2E7D78',border:'#9dd0cb',dot:'#2E7D78'},   // teal
  {bg:'#f3eafc',color:'#6a3fa3',border:'#c9a8e8',dot:'#8B5CF6'},   // purple
  {bg:'#e8f5e9',color:'#2e7d32',border:'#a5d6a7',dot:'#2e7d32'},   // green
];
const ALL_TOPICS = [...new Set(PAPERS.map(p=>p.topic))].sort();
const TOPIC_PAL  = Object.fromEntries(ALL_TOPICS.map((t,i)=>[t, TOPIC_PALETTES[i % TOPIC_PALETTES.length]]));

const TAG_CLASS = {
  'physical-reservoir-computing':'tag-prc','reservoir-computing':'tag-rc',
  'dynamical-systems':'tag-dyn','nonlinear-dynamics':'tag-dyn',
  'embodied-intelligence':'tag-emb','mechanical-intelligence':'tag-emb',
  'morphological-computation':'tag-emb','soft-robotics':'tag-emb',
  'soft-body-dynamics':'tag-emb','robot-learning':'tag-emb',
  'memory-capacity':'tag-mem','neuromorphic-computing':'tag-neuro',
};
const TYPE_ICON  = {theory:'⚗',experiment:'🔬',simulation:'💻',review:'📖'};
const TYPE_COLOR = {theory:'#c0607a',experiment:'#E5751F',simulation:'#4A7FB5',review:'#2E7D78'};

// ── Stats / topic bar ─────────────────────────────────────────
let activeTopicFilter = '', activeTypeFilter = '';

function buildStats(){
  document.getElementById('total-count').textContent = PAPERS.length;
  const bar = document.getElementById('stats-bar');

  // Topic chips
  bar.innerHTML += `<span class="bar-label">Topic</span>`;
  ALL_TOPICS.forEach(topic => {
    const count = PAPERS.filter(p=>p.topic===topic).length;
    const pal   = TOPIC_PAL[topic];
    const id    = 'tchip-'+topic.replace(/\s+/g,'_');
    bar.innerHTML += `<span class="stat-chip" id="${id}" onclick="toggleTopicChip('${topic}')"
      style="--chip-bg:rgba(255,255,255,.1);">
      <span class="dot" style="background:${pal.dot}"></span>${topic}: ${count}
    </span>`;
  });

  bar.innerHTML += `<span class="bar-divider"></span><span class="bar-label">Type</span>`;
  ['theory','experiment','simulation','review'].forEach(t=>{
    const count = PAPERS.filter(p=>p.paper_type===t).length;
    if(!count) return;
    bar.innerHTML += `<span class="stat-chip" id="chip-${t}" onclick="toggleTypeChip('${t}')">
      <span class="dot" style="background:${TYPE_COLOR[t]}"></span>
      ${t.charAt(0).toUpperCase()+t.slice(1)}: ${count}
    </span>`;
  });
}

function toggleTopicChip(topic){
  activeTopicFilter = activeTopicFilter===topic ? '' : topic;
  document.querySelectorAll('[id^="tchip-"]').forEach(c=>c.classList.remove('active-filter'));
  if(activeTopicFilter){
    document.getElementById('tchip-'+activeTopicFilter.replace(/\s+/g,'_'))?.classList.add('active-filter');
  }
  applyFilters();
}
function toggleTypeChip(type){
  activeTypeFilter = activeTypeFilter===type ? '' : type;
  document.querySelectorAll('[id^="chip-"]').forEach(c=>c.classList.remove('active-filter'));
  if(activeTypeFilter) document.getElementById('chip-'+activeTypeFilter)?.classList.add('active-filter');
  applyFilters();
}

// ── Year filter ───────────────────────────────────────────────
function buildYearFilter(){
  const years=[...new Set(PAPERS.map(p=>p.year).filter(Boolean))].sort((a,b)=>b-a);
  const sel=document.getElementById('year-filter');
  years.forEach(y=>{ const o=document.createElement('option');o.value=y;o.textContent=y;sel.appendChild(o); });
}

// ── Tag filter chips ──────────────────────────────────────────
const ALL_TAGS=[...new Set(PAPERS.flatMap(p=>p.tags))].sort();
let activeTags=new Set();
function buildTagFilters(){
  const c=document.getElementById('tag-filters');
  ALL_TAGS.forEach(tag=>{
    const b=document.createElement('span');
    b.className='filter-tag';b.textContent=tag;b.dataset.tag=tag;
    b.onclick=()=>toggleTag(tag,b);c.appendChild(b);
  });
}
function toggleTag(tag,btn){
  if(activeTags.has(tag)){activeTags.delete(tag);btn.classList.remove('active');}
  else{activeTags.add(tag);btn.classList.add('active');}
  applyFilters();
}

// ── Row renderer ──────────────────────────────────────────────
function makeTagHtml(tags){
  return tags.map(t=>`<span class="tag ${TAG_CLASS[t]||'tag-other'}" onclick="filterByTag(event,'${t}')">${t}</span>`).join('');
}
function topicBadgeHtml(topic){
  const pal=TOPIC_PAL[topic]||TOPIC_PALETTES[0];
  return `<span class="topic-badge"
    style="background:${pal.bg};color:${pal.color};border:1px solid ${pal.border};"
    onclick="filterByTopic(event,'${topic}')">${topic}</span>`;
}
function renderRow(p,idx){
  const tc='type-'+(p.paper_type||'other');
  const sc='status-'+(p.read_status||'unread').toLowerCase();
  return `
<tr class="paper-row" data-idx="${idx}" onclick="toggleDetail(${idx},this)">
  <td style="text-align:center;"><span class="expand-btn">+</span></td>
  <td><span class="cite-key">${p.citation_key}</span></td>
  <td><div class="paper-title">${p.title}</div></td>
  <td>${p.authors}</td>
  <td><span class="year-badge">${p.year}</span></td>
  <td>${topicBadgeHtml(p.topic)}</td>
  <td><span class="type-badge ${tc}">${TYPE_ICON[p.paper_type]||'•'} ${p.paper_type}</span></td>
  <td><span class="status-badge ${sc}">${p.read_status}</span></td>
  <td><div class="tags-cell">${makeTagHtml(p.tags)}</div></td>
</tr>
<tr class="detail-row" id="detail-${idx}" style="display:none;">
  <td colspan="9"><div class="detail-inner">${p.body_html}</div></td>
</tr>`;
}

// ── Sort ──────────────────────────────────────────────────────
let sortCol=4, sortDir=-1;
const COL_KEY={
  1:p=>p.citation_key, 2:p=>p.title, 3:p=>p.authors,
  4:p=>parseInt(p.year)||0, 5:p=>p.topic,
  6:p=>p.paper_type, 7:p=>p.read_status,
};
function sortBy(col){
  sortDir = sortCol===col ? -sortDir : (col===4?-1:1);
  sortCol=col;
  document.querySelectorAll('thead th').forEach((th,i)=>{
    th.classList.remove('sorted-asc','sorted-desc');
    if(i===col) th.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
  });
  applyFilters();
}

// ── Filter + render ───────────────────────────────────────────
function applyFilters(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const status=document.getElementById('status-filter').value;
  const year=document.getElementById('year-filter').value;

  let filtered=PAPERS.filter(p=>{
    if(q && !`${p.title} ${p.authors} ${p.citation_key}`.toLowerCase().includes(q)) return false;
    if(activeTopicFilter && p.topic!==activeTopicFilter) return false;
    if(activeTypeFilter  && p.paper_type!==activeTypeFilter)  return false;
    if(status && p.read_status!==status) return false;
    if(year   && String(p.year)!==year)  return false;
    if(activeTags.size && ![...activeTags].every(t=>p.tags.includes(t))) return false;
    return true;
  });

  const kf=COL_KEY[sortCol];
  if(kf) filtered.sort((a,b)=>{const av=kf(a),bv=kf(b);return av<bv?-sortDir:av>bv?sortDir:0;});

  document.getElementById('tbody').innerHTML=filtered.map(p=>renderRow(p,PAPERS.indexOf(p))).join('');
  document.getElementById('results-count').textContent=
    filtered.length===PAPERS.length?`${PAPERS.length} papers`:`${filtered.length} / ${PAPERS.length}`;
  document.getElementById('no-results').style.display=filtered.length?'none':'block';
  document.getElementById('papers-table').style.display=filtered.length?'':'none';
}

// ── Detail expand ─────────────────────────────────────────────
function toggleDetail(idx,row){
  const d=document.getElementById('detail-'+idx);
  const open=d.style.display!=='none';
  d.style.display=open?'none':'table-row';
  row.classList.toggle('expanded',!open);
}

// ── Click-through filters ─────────────────────────────────────
function filterByTag(evt,tag){
  evt.stopPropagation();
  activeTags.clear();activeTags.add(tag);
  document.querySelectorAll('.filter-tag').forEach(b=>b.classList.toggle('active',b.dataset.tag===tag));
  applyFilters();
}
function filterByTopic(evt,topic){
  evt.stopPropagation();
  activeTopicFilter = activeTopicFilter===topic ? '' : topic;
  document.querySelectorAll('[id^="tchip-"]').forEach(c=>c.classList.remove('active-filter'));
  if(activeTopicFilter)
    document.getElementById('tchip-'+activeTopicFilter.replace(/\s+/g,'_'))?.classList.add('active-filter');
  applyFilters();
}

// ── Reset ─────────────────────────────────────────────────────
function resetFilters(){
  document.getElementById('search').value='';
  document.getElementById('status-filter').value='';
  document.getElementById('year-filter').value='';
  activeTags.clear();activeTopicFilter='';activeTypeFilter='';
  document.querySelectorAll('.filter-tag').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.stat-chip').forEach(c=>c.classList.remove('active-filter'));
  sortCol=4;sortDir=-1;
  document.querySelectorAll('thead th').forEach((th,i)=>{
    th.classList.remove('sorted-asc','sorted-desc');
    if(i===4) th.classList.add('sorted-desc');
  });
  applyFilters();
}

buildStats();buildYearFilter();buildTagFilters();resetFilters();
document.querySelectorAll('thead th')[4]?.classList.add('sorted-desc');
</script>
