<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Library — Paper Visualization</title>
<style>
/* ── VT Design Tokens ──────────────────────────────────────── */
:root {
  --vt-maroon:       #861F41;
  --vt-maroon-dark:  #5C1530;
  --vt-maroon-light: #A8304F;
  --vt-orange:       #E5751F;
  --vt-stone:        #75787B;
  --vt-stone-light:  #BEBFC0;
  --vt-stone-xlt:    #F2F0EF;
  --vt-white:        #FFFFFF;
  --vt-black:        #1A1A1A;
  --vt-blue:         #4A7FB5;
  --vt-teal:         #2E7D78;
  --radius:          6px;
  --shadow:          0 2px 10px rgba(0,0,0,.13);
  --transition:      .17s ease;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  font-size:14px;background:var(--vt-stone-xlt);color:var(--vt-black);min-height:100vh;
}

/* ── Header ─────────────────────────────────────────────────── */
header{
  background:linear-gradient(135deg,var(--vt-maroon-dark) 0%,var(--vt-maroon) 55%,var(--vt-maroon-light) 100%);
  color:var(--vt-white);padding:26px 40px 22px;box-shadow:0 3px 14px rgba(0,0,0,.28);
}
.header-accent{display:inline-block;width:36px;height:4px;background:var(--vt-orange);border-radius:2px;margin-bottom:10px;}
header h1{font-size:1.55rem;font-weight:700;letter-spacing:.02em;}
header p.subtitle{margin-top:4px;font-size:.88rem;opacity:.82;}

/* ── Stats / Topic bar ──────────────────────────────────────── */
.stats-bar{
  display:flex;flex-wrap:wrap;gap:8px;
  padding:12px 40px;background:var(--vt-maroon-dark);
  align-items:center;
}
.bar-divider{width:1px;height:22px;background:rgba(255,255,255,.2);margin:0 4px;}
.bar-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.5);}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);color:var(--vt-white);
  padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;
  cursor:pointer;transition:background var(--transition);user-select:none;
}
.stat-chip:hover{background:rgba(255,255,255,.22);}
.stat-chip.active-filter{background:var(--vt-orange) !important;}
.stat-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── Controls ───────────────────────────────────────────────── */
.controls{
  padding:16px 40px;background:var(--vt-white);
  border-bottom:1px solid var(--vt-stone-light);
  display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;
}
.control-group{display:flex;flex-direction:column;gap:5px;}
.control-group label{
  font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--vt-stone);
}
input[type="text"],select{
  padding:7px 12px;border:1.5px solid var(--vt-stone-light);border-radius:var(--radius);
  font-size:.875rem;background:var(--vt-white);color:var(--vt-black);
  transition:border-color var(--transition),box-shadow var(--transition);outline:none;
}
input[type="text"]:focus,select:focus{
  border-color:var(--vt-maroon);box-shadow:0 0 0 3px rgba(134,31,65,.12);
}
input[type="text"]{min-width:260px;}
select{min-width:150px;cursor:pointer;}

.filter-tags{display:flex;flex-wrap:wrap;gap:5px;max-width:700px;}
.filter-tag{
  padding:3px 10px;border-radius:20px;border:1.5px solid var(--vt-stone-light);
  background:var(--vt-white);font-size:.72rem;font-weight:700;
  cursor:pointer;transition:all var(--transition);user-select:none;color:var(--vt-stone);
}
.filter-tag:hover{border-color:var(--vt-maroon);color:var(--vt-maroon);}
.filter-tag.active{background:var(--vt-maroon);border-color:var(--vt-maroon);color:var(--vt-white);}

.btn-reset{
  padding:7px 16px;border-radius:var(--radius);border:1.5px solid var(--vt-orange);
  background:transparent;color:var(--vt-orange);font-size:.875rem;font-weight:600;
  cursor:pointer;transition:all var(--transition);height:34px;align-self:flex-end;
}
.btn-reset:hover{background:var(--vt-orange);color:var(--vt-white);}
.results-count{align-self:flex-end;padding-bottom:2px;font-size:.8rem;color:var(--vt-stone);}

/* ── Table ──────────────────────────────────────────────────── */
.table-wrap{padding:20px 40px 48px;overflow-x:auto;}
table{
  width:100%;border-collapse:separate;border-spacing:0;
  background:var(--vt-white);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;
}
thead th{
  background:var(--vt-maroon);color:var(--vt-white);padding:11px 14px;
  font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  white-space:nowrap;user-select:none;cursor:pointer;
  position:sticky;top:0;z-index:2;
  border-right:1px solid var(--vt-maroon-dark);transition:background var(--transition);
}
thead th:last-child{border-right:none;}
thead th:hover{background:var(--vt-maroon-light);}
.sort-icon{margin-left:4px;opacity:.55;font-size:.68rem;}
thead th.sorted-asc  .sort-icon::after{content:" ▲";opacity:1;}
thead th.sorted-desc .sort-icon::after{content:" ▼";opacity:1;}
thead th:not(.sorted-asc):not(.sorted-desc) .sort-icon::after{content:" ⇅";}

tbody tr.paper-row{cursor:pointer;transition:background var(--transition);border-bottom:1px solid #f0eeed;}
tbody tr.paper-row:hover{background:#fdf5f6;}
tbody tr.paper-row.expanded{background:#fdf0f3;}
tbody td{padding:10px 14px;vertical-align:middle;font-size:.83rem;border-right:1px solid #f0eeed;}
tbody td:last-child{border-right:none;}

/* ── Detail row ─────────────────────────────────────────────── */
tr.detail-row td{padding:0;background:#fff8f9;border-bottom:2px solid var(--vt-maroon);}
.detail-inner{
  display:grid;grid-template-columns:1fr 1fr;gap:0 32px;
  padding:20px 32px;max-height:440px;overflow-y:auto;
}
.detail-inner h2{
  font-size:.95rem;color:var(--vt-maroon);margin-bottom:6px;padding-bottom:4px;
  border-bottom:2px solid var(--vt-orange);grid-column:1/-1;
}
.detail-inner h3{
  font-size:.78rem;font-weight:700;color:var(--vt-maroon);
  margin-top:12px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;
}
.detail-inner p{font-size:.84rem;line-height:1.65;color:#333;margin-bottom:6px;}
.detail-inner ul{padding-left:18px;margin-bottom:6px;}
.detail-inner li{font-size:.84rem;line-height:1.6;color:#333;}

/* ── Expand button ──────────────────────────────────────────── */
.expand-btn{
  width:21px;height:21px;border-radius:50%;
  background:var(--vt-stone-xlt);border:1.5px solid var(--vt-stone-light);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.7rem;color:var(--vt-stone);transition:all var(--transition);flex-shrink:0;
}
tr.expanded .expand-btn{
  background:var(--vt-maroon);border-color:var(--vt-maroon);color:var(--vt-white);transform:rotate(45deg);
}

/* ── Cell styles ─────────────────────────────────────────────── */
.cite-key{font-family:'Courier New',monospace;font-size:.77rem;color:var(--vt-maroon);font-weight:700;white-space:nowrap;}
.paper-title{font-size:.85rem;font-weight:600;line-height:1.35;max-width:320px;}
.year-badge{
  display:inline-block;background:var(--vt-stone-xlt);border:1px solid var(--vt-stone-light);
  color:var(--vt-black);padding:2px 8px;border-radius:var(--radius);font-size:.77rem;font-weight:700;white-space:nowrap;
}

/* ── Topic badge ────────────────────────────────────────────── */
.topic-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:.72rem;font-weight:700;white-space:nowrap;cursor:pointer;
  transition:opacity var(--transition);
}
.topic-badge:hover{opacity:.75;}

/* ── Type badges ────────────────────────────────────────────── */
.type-badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;
  font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;
}
.type-theory    {background:#f5e9ec;color:var(--vt-maroon);border:1px solid #d4a0b0;}
.type-experiment{background:#fef0e4;color:#b85500;border:1px solid #f0c090;}
.type-simulation{background:#e8f1f9;color:#2d5f8a;border:1px solid #9bbdd9;}
.type-review    {background:#e6f4f3;color:var(--vt-teal);border:1px solid #9dd0cb;}

/* ── Status badges ──────────────────────────────────────────── */
.status-badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:.71rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;
}
.status-read   {background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.status-skimmed{background:#fff8e1;color:#f57f17;border:1px solid #ffe082;}
.status-unread {background:#f3f3f3;color:var(--vt-stone);border:1px solid #ddd;}

/* ── Tags ────────────────────────────────────────────────────── */
.tags-cell{display:flex;flex-wrap:wrap;gap:4px;max-width:240px;}
.tag{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:.68rem;font-weight:600;white-space:nowrap;
  cursor:pointer;transition:opacity var(--transition);
}
.tag:hover{opacity:.72;}
.tag-prc  {background:#f0e6ea;color:var(--vt-maroon);border:1px solid #d4a0b0;}
.tag-rc   {background:#fdeee3;color:#b85500;border:1px solid #f0c090;}
.tag-dyn  {background:#e8f1f9;color:#2d5f8a;border:1px solid #9bbdd9;}
.tag-emb  {background:#e6f4f3;color:var(--vt-teal);border:1px solid #9dd0cb;}
.tag-mem  {background:#f3eafc;color:#6a3fa3;border:1px solid #c9a8e8;}
.tag-neuro{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.tag-other{background:#f3f3f3;color:#555;border:1px solid #ddd;}

.no-results{text-align:center;padding:60px 20px;color:var(--vt-stone);font-size:.95rem;}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#f1f1f1;}
::-webkit-scrollbar-thumb{background:var(--vt-stone-light);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--vt-maroon);}

@media(max-width:900px){
  header,.stats-bar,.controls,.table-wrap{padding-left:16px;padding-right:16px;}
  .detail-inner{grid-template-columns:1fr;}
  input[type="text"]{min-width:180px;}
}
</style>
</head>
<body>

<header>
  <div class="header-accent"></div>
  <h1>Research Library</h1>
  <p class="subtitle">All topics &mdash; <span id="total-count"></span> papers</p>
</header>

<!-- Topic chips + type chips -->
<div class="stats-bar" id="stats-bar"></div>

<div class="controls">
  <div class="control-group">
    <label>Search</label>
    <input type="text" id="search" placeholder="Title, author, citation key&hellip;" oninput="applyFilters()">
  </div>
  <div class="control-group">
    <label>Year</label>
    <select id="year-filter" onchange="applyFilters()">
      <option value="">All years</option>
    </select>
  </div>
  <div class="control-group">
    <label>Read Status</label>
    <select id="status-filter" onchange="applyFilters()">
      <option value="">All statuses</option>
      <option value="read">Read</option>
      <option value="skimmed">Skimmed</option>
      <option value="unread">Unread</option>
    </select>
  </div>
  <div class="control-group" style="flex:1;min-width:220px;">
    <label>Filter by Tag</label>
    <div class="filter-tags" id="tag-filters"></div>
  </div>
  <button class="btn-reset" onclick="resetFilters()">Reset all</button>
  <span class="results-count" id="results-count"></span>
</div>

<div class="table-wrap">
<table id="papers-table">
  <thead><tr>
    <th style="width:36px;cursor:default;"></th>
    <th onclick="sortBy(1)">Citation Key<span class="sort-icon"></span></th>
    <th onclick="sortBy(2)">Title<span class="sort-icon"></span></th>
    <th onclick="sortBy(3)">Authors<span class="sort-icon"></span></th>
    <th onclick="sortBy(4)">Year<span class="sort-icon"></span></th>
    <th onclick="sortBy(5)">Topic<span class="sort-icon"></span></th>
    <th onclick="sortBy(6)">Type<span class="sort-icon"></span></th>
    <th onclick="sortBy(7)">Status<span class="sort-icon"></span></th>
    <th style="cursor:default;">Tags</th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
<div class="no-results" id="no-results" style="display:none;">No papers match the current filters.</div>
</div>

<script>
const PAPERS = [{"citation_key": "Liu2026combinatorial", "title": "Combinatorial Design of Floppy Modes and Frustrated Loops in Metamaterials", "authors": "Liu et al.", "year": 2026, "paper_type": "theory", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "mechanical-metamaterials"], "topic": "Methodologies and Techniques", "body_html": "<h2>Liu2026combinatorial — Combinatorial Design of Floppy Modes and Frustrated Loops in Metamaterials</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper presents a combinatorial design strategy for prescribing large numbers of floppy modes and frustrated loops in mechanical metamaterials. It uses a spin-model-like description to control not just how many soft modes exist, but also their shapes and connectivity. By adding kinematic incompatibility, the same design language produces mechanically frustrated loops. The authors then use those structures for sequential buckling behavior and in-materia matrix-vector multiplication.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The paper derives counting rules for floppy modes in chains of triangular building blocks and shows how parity and bonding control whether a chain is floppy or frustrated. It validates the design ideas with experiments on printed metamaterials that exhibit the predicted mode structure. The extracted results further show sequential yield buckling of designed floppy chains under compression and demonstrate matrix-vector multiplication using floppy and frustrated-loop architectures. The paper combines combinatorial theory, mechanical construction, and functional demonstrations.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that floppy modes can be treated as programmable mechanical resources rather than accidental soft directions. The work makes them composable enough to support sequential actuation and simple computation inside material architectures. A limitation is that the demonstrated tasks remain specialized and strongly tied to the chosen building-block geometry and deformation regime. General-purpose computation or robust large-scale mechanical programming is not yet established.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How far can combinatorial floppy-mode design scale before fabrication error, contact, and nonlinear material behavior disrupt the intended mechanical logic?</p>"}, {"citation_key": "Khairnar2026spider", "title": "Spider Web-Inspired Sensing and Computation with Fiber Network Physical Reservoirs", "authors": "Khairnar et al.", "year": 2026, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "mechanical-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Khairnar2026spider — Spider Web-Inspired Sensing and Computation with Fiber Network Physical Reservoirs</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper develops spider-web-inspired fiber reservoirs for sensing and computation. It shows that topology, spacing, pretension, and input conditions shape how much useful processing the network provides. The contribution is a more systematic design study of compliant fiber reservoirs that links morphology to benchmark capability and sensing efficiency. It pushes the earlier fiber-network idea toward tunable reservoir design.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors compare network families such as crosshatch and polygonal layouts, examine reservoir capacity under different mechanical settings, and test physical networks on NARMA-style tasks. They also study feature downselection, reporting that strong performance can persist after discarding a substantial fraction of candidate readout features. The paper finds crosshatch designs particularly competitive in the reported experiments. The evidence combines physical prototypes with quantitative task evaluation and architecture comparisons.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that compliant network morphology is not decorative; it directly changes the computation available to a physical reservoir. The feature-pruning results also suggest that sensing layouts may be reducible without destroying performance. The main limitation is that the best design choices still depend on the chosen tasks and measurement arrangement. The paper advances design heuristics, but not a universal web-like reservoir blueprint.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can topology and sensor placement be co-designed automatically so that fiber reservoirs adapt to a target sensing task before fabrication?</p>"}, {"citation_key": "Koch2026understanding", "title": "Understanding Task Performance of Time-Multiplexed Optical Reservoir Computing via Polynomial Expansions", "authors": "Koch et al.", "year": 2026, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Koch2026understanding — Understanding Task Performance of Time-Multiplexed Optical Reservoir Computing via Polynomial Expansions</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper explains the task performance of a time-multiplexed optical reservoir by expanding its input-output behavior into explicit polynomial terms. The central claim is that reservoir success or failure can often be traced to which monomials the optical system and its readout can represent. The contribution is a theory-driven interpretability framework for passive optical reservoirs. It shows that benchmark performance is constrained by representational structure, not only by empirical parameter tuning.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors analyze a passive linear optical recurrence followed by quadratic photodetection and derive which nonlinear combinations of input history become accessible. They connect transient coupling and delay to improved performance when the task's needed terms lie inside the representable family. Case studies involving Lorenz- and Chua-like tasks illustrate how missing nonlinear orders impose hard limits. The support is primarily analytical, with numerical comparisons used to confirm the implications.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that an optical reservoir can fail for structural reasons even when it is well tuned numerically. Polynomial visibility gives a clearer way to diagnose such failures. The limitation is that the specific conclusions depend on the passive linear-plus-quadratic architecture studied here, so richer optical nonlinearities may alter the representable family substantially. The paper provides a sharp explanation for one important class of systems rather than all optical reservoirs.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How should optical hardware and readout nonlinearity be co-designed so that the representable polynomial family matches a target task class?</p>"}, {"citation_key": "Wang2026embodying", "title": "Embodying Physical Computing into Soft Robots", "authors": "Wang et al.", "year": 2026, "paper_type": "review", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "soft-robotics", "morphological-computation", "embodied-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Wang2026embodying — Embodying Physical Computing into Soft Robots</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This perspective reviews how physical computing concepts can be embedded into soft robots. It covers analog oscillatory control, physical reservoir computing, and mechanical logic as complementary ways to reduce digital control burden or exploit body dynamics directly. The contribution is a systems-level argument that physical computing should be integrated with soft robotic design rather than treated as an isolated hardware curiosity. It explicitly frames digital and physical computing as potentially complementary.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors synthesize examples across rhythmic motion generation, perception, embodied control, and programmable logic in soft systems. They compare different forms of physical computing by the behaviors they enable and the kinds of interfaces they require. The paper also discusses how future soft robots may combine physical and conventional electronics rather than replacing one with the other. Its evidence is a curated cross-domain perspective.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that soft robots provide a natural host for physical computation because their bodies already contain rich, task-relevant dynamics. Embedding computation into that physical substrate may improve responsiveness, simplicity, or robustness in selected settings. The limitation is that the article is a perspective, so it does not benchmark one architecture against alternatives under a common protocol. It clarifies the design space more than it settles the engineering hierarchy.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What hybrid control architecture best divides labor between physical computation in the body and digital computation in the controller?</p>"}, {"citation_key": "Chen2025advances", "title": "Advances in Metamaterials for Mechanical Computing", "authors": "Chen et al.", "year": 2025, "paper_type": "review", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "mechanical-metamaterials"], "topic": "Methodologies and Techniques", "body_html": "<h2>Chen2025advances — Advances in Metamaterials for Mechanical Computing</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This review surveys how mechanical metamaterials have evolved from unusual structural materials into substrates for computation, logic, and information storage. It argues that mechanical computing can complement electronics in settings where robustness, low power, direct physical interaction, or extreme environments matter. The paper's central contribution is a coherent taxonomy of mechanical logic elements, memory units, programmable metamaterials, and their possible integration into machines and robots. It frames the field as a growing computing paradigm rather than a collection of isolated mechanical tricks.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors organize the review around the history of mechanical computing, binary and ternary logic elements, mechanical memory, error-tolerant architectures, programmable systems, and system-level applications. They examine how bistability, snap-through, structure coupling, and multifunctional metamaterial architectures realize computation and storage. Representative examples include logic gates, mechano-synapses, adaptive robotic structures, and self-reprogrammable systems. The evidence is a literature synthesis that compares mechanisms, application targets, and design motivations across the field.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that mechanical metamaterials are increasingly being designed to process and store information, not merely to bear loads. This makes them relevant wherever function should be embodied directly into structure. The main limitation is that the field still spans heterogeneous devices with different assumptions about logic, speed, reconfigurability, and integration with electronics, making apples-to-apples comparison difficult. The review maps the terrain well, but universal performance standards remain immature.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Which mechanical-computing functions are genuinely better embodied in metamaterials than implemented through conventional sensing plus digital control?</p>"}, {"citation_key": "Chen2025mining", "title": "Mining Extreme Properties from a Large Metamaterial Database", "authors": "Chen et al.", "year": 2025, "paper_type": "simulation", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "mechanical-metamaterials"], "topic": "Methodologies and Techniques", "body_html": "<h2>Chen2025mining — Mining Extreme Properties from a Large Metamaterial Database</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper argues that very large architecture-property databases can uncover extreme mechanical metamaterial behavior that sparse design catalogs miss. It builds a 2D truss-metamaterial database containing 1,846,182 architectures and uses it to identify near-Voigt-bound stiffness, widely programmable Poisson's ratios, and rare isotropic bi-mode responses. The authors also introduce mechanical isomerism: architectures with closely related coding descriptors but sharply different effective properties. The contribution is both a database-building framework and a design principle for mining exceptional mechanical behavior.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The workflow converts compact architectural rules and graphical transformations into a large truss-architecture space, then evaluates effective elastic properties to form an architecture-property database. The paper mines this database for extreme Young's modulus, extreme positive and negative Poisson's ratio, and isotropic bi-mode cases. The extracted results section reports examples approaching the Voigt bound, Poisson's ratios spanning from strongly negative to strongly positive, and four isotropic bi-mode families. Mechanical isomerism is supported by case studies showing that small architectural rearrangements cause orders-of-magnitude property changes.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The paper's practical message is that scale and architectural diversity matter when searching for rare metamaterial responses. Its database exposes both extreme values and mechanistic patterns that would be difficult to infer from a small hand-built library. The limitation is that the study is centered on generated 2D truss families and computed effective properties, so transfer to broader geometries, manufacturability regimes, and full experimental validation remains incomplete. The database is powerful, but its conclusions inherit the modeling scope used to generate it.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can the mechanical-isomerism idea be turned into a general inverse-design strategy that remains reliable under fabrication tolerances and richer 3D metamaterial families?</p>"}, {"citation_key": "Grimaldi2025a", "title": "A Multiphysics Reservoir Computing System with Mass-Spring Metamaterials and Spintronic Readout for Vibration Analysis", "authors": "Grimaldi et al.", "year": 2025, "paper_type": "simulation", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "reservoir-computing", "mechanical-metamaterials"], "topic": "Methodologies and Techniques", "body_html": "<h2>Grimaldi2025a — A Multiphysics Reservoir Computing System with Mass-Spring Metamaterials and Spintronic Readout for Vibration Analysis</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper proposes a hybrid physical reservoir computer that couples nonlinear mass-spring mechanical metamaterials with spintronic readout. The idea is to use mechanical vibration dynamics as the reservoir and magnetic tunnel junction-based spin diodes as the compact electrical observation layer. The main contribution is a multiphysics architecture aimed at real-time vibration and acoustic classification with direct physical signal injection. It positions the system as a tunable, potentially scalable reservoir platform for edge sensing.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors simulate a two-dimensional nonlinear elastic network whose masses are paired with spintronic sensing elements, then feed vowel-related frequency inputs into the model. The mechanical dynamics map those inputs into a richer state space, and a simple trainable readout performs classification. On the reported vowel recognition benchmark, training and validation accuracy reach slightly above `90%`. The paper supports the concept through coupled mechanical and spintronic modeling rather than a fabricated hardware prototype.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that mechanical reservoirs and electrical readout need not be treated separately; co-designed multiphysics interfaces can simplify how real vibrations enter a computing system. This is relevant for sensing tasks where the signal is already mechanical. The main limitation is that the demonstrated system is still simulation-based and uses a carefully prepared benchmark rather than end-to-end hardware data. The architecture is promising, but its practical tunability, noise behavior, and fabrication pathway remain open.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can the proposed spintronic-mechanical reservoir maintain its reported classification benefits once implemented with realistic fabrication tolerances, measurement noise, and live vibration inputs?</p>"}, {"citation_key": "Momeni2025training", "title": "Training of Physical Neural Networks", "authors": "Momeni et al.", "year": 2025, "paper_type": "review", "read_status": "skimmed", "tags": ["methodologies-and-techniques"], "topic": "Methodologies and Techniques", "body_html": "<h2>Momeni2025training — Training of Physical Neural Networks</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This review organizes the emerging problem of how to train physical neural networks at useful scale. It argues that the main challenge is not only building physical computing substrates, but also obtaining gradients or viable learning signals when the computation is embodied in hardware. The paper surveys software-side and hardware-aware training strategies rather than proposing a single new algorithm. Its contribution is a map of the training landscape for physical neural networks and the tradeoffs among available approaches.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The review covers in-silico training, physics-aware backpropagation, direct feedback alignment and local methods, zeroth-order schemes, physical gradient descent, adjoint approaches, equilibrium-propagation-style methods, and echo-backpropagation ideas. It compares these approaches by scalability, use of hardware gradients, demonstrated dataset size, and compatibility with different physical substrates. The extracted discussion repeatedly emphasizes mismatch between digital simulations and real physical devices, along with the possible energy advantage of training more directly in hardware. Evidence is synthesized across the literature rather than generated by one new experiment.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The central takeaway is that training remains the bottleneck for physical neural networks, especially when one wants both hardware realism and scale. The review is useful because it separates gradient access, device mismatch, and system-level scalability instead of treating training as a single monolithic problem. Its limitation is that the field is moving quickly and many methods remain demonstrated only on modest systems or narrow device classes. No universally dominant training paradigm has emerged.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Which training strategy will first deliver a convincing combination of scalability, robustness to hardware mismatch, and net energy benefit over digital baselines?</p>"}, {"citation_key": "She2025a", "title": "A Generative Framework for Structural Crack Discovery under Limited Sensing", "authors": "She et al.", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["methodologies-and-techniques"], "topic": "Methodologies and Techniques", "body_html": "<h2>She2025a — A Generative Framework for Structural Crack Discovery under Limited Sensing</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper proposes SparseGen-Damage, a generative AI framework for identifying internal structural cracks from sparse sensing data. Its central idea is to convert limited point measurements into reconstructed full-field strain information, then infer crack geometry from that richer representation. The contribution is a perceive-reconstruct-identify pipeline designed for structural health monitoring under sensor scarcity. It aims to reduce sensing burden while keeping crack localization and quantification accurate.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The method combines three modules: an LSTM for variable-length sparse inputs, a conditional GAN for high-resolution strain-field reconstruction, and an FPN-based identification stage for crack-tip localization. The paper validates the approach on aluminum alloy plates with internal straight cracks and reports crack length errors under `4%` plus orientation errors below `2 degrees`. It also analyzes robustness to sensor density, crack length, and generalization to cases outside the training distribution. The evidence therefore combines a structured machine-learning architecture with experimental validation and targeted sensitivity studies.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that sparse sensors can support much richer damage inference when they are embedded in a reconstruction pipeline rather than used only for direct regression. This is valuable for structures where dense sensor deployment is impractical. The main limitation is that the demonstrated crack family and structural setting are still controlled, and reconstruction quality remains tied to the learned training distribution. The framework is promising for SHM, but its transfer to more irregular damage, noisier settings, and field deployment remains open.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How well does SparseGen-Damage generalize to complex, evolving crack morphologies and real operational noise that differ substantially from the training cases?</p>"}, {"citation_key": "Yamaguchi2025controllability", "title": "Controllability Analysis of Origami Dynamics via State-Space Modeling", "authors": "Yamaguchi et al.", "year": 2025, "paper_type": "theory", "read_status": "skimmed", "tags": ["methodologies-and-techniques", "mechanical-metamaterials"], "topic": "Methodologies and Techniques", "body_html": "<h2>Yamaguchi2025controllability — Controllability Analysis of Origami Dynamics via State-Space Modeling</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper develops a state-space framework for analyzing the dynamics and controllability of Miura-ori origami systems. It addresses a gap between rich origami kinematics and practical control design under compliant, non-rigid behavior. The central contribution is to use controllability Gramian analysis to identify crease locations that are most efficient for deployment actuation. This turns origami actuation layout into a control-theoretic design problem.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors discretize origami cells into bar-and-hinge dynamic models, derive state-space representations, and compute controllability metrics for single and tessellated Miura-ori structures. They compare predicted efficient crease lines with experiments on stainless-steel origami prototypes actuated by servo motors. The paper reports good agreement between Gramian-based rankings and measured deployment efficiency across studied configurations. The support is therefore theoretical modeling tied to physical validation.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that controllability tools can guide where to place actuators on compliant origami structures instead of relying on intuition alone. This is a useful methodological bridge between reduced-order mechanics and engineering control. The main limitation is that the framework is demonstrated on a specific origami family and deployment objective, so transfer to richer morphing tasks or strongly nonlinear contact conditions remains open. The modeling approach is promising, but not yet universal across origami robotics.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can state-space controllability analysis be extended to optimize actuator placement for complex origami tasks involving contact, payloads, or multi-objective shape changes?</p>"}, {"citation_key": "Alu2025roadmap", "title": "Roadmap on Embodying Mechano-Intelligence and Computing in Functional Materials and Structures", "authors": "Alu et al.", "year": 2025, "paper_type": "review", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "mechanical-intelligence", "morphological-computation", "neuromorphic-computing", "embodied-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Alu2025roadmap — Roadmap on Embodying Mechano-Intelligence and Computing in Functional Materials and Structures</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This roadmap organizes a broad research agenda for mechano-intelligence: engineering systems in which materials and structures help sense, remember, compute, adapt, and act. Across twelve sections, it connects wave-based computing, neuromorphic and memory-bearing materials, soft matter logic, morphological computation, mechanical neural networks, physical reservoir computing, and robotics. The paper's central claim is not a single new device result, but that future adaptive systems should integrate intelligence more directly into physical substrates instead of relying only on centralized electronics. It frames this shift as relevant to autonomous robots, tunable structures, wearables, and other systems that need efficient, resilient interaction with their environments.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The paper supports its roadmap through a structured synthesis of recent work across materials, devices, and system-level demonstrations. Its physical-computing section highlights examples where nonlinear mechanical dynamics are used for information perception, decision-making, and locomotion, including physical reservoir computing in phononic metamaterials and origami robots. Other sections review mechanical memory, soft logic, morphological computation, and neuromorphic metamaterials as complementary building blocks for embodied intelligence. The evidence is therefore comparative and programmatic: the authors assemble concrete advances and use them to identify recurring design needs around memory, sensing, adaptive feedback, and integration with mechanical function.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that mechano-intelligence is emerging as a shared design direction across multiple communities, and physical computing is one plausible route for giving structures more local autonomy. The roadmap makes a strong case that intelligence-relevant functions should be considered jointly with materials, geometry, dynamics, sensing, and actuation rather than added afterward. Its main limitation is also inherent to the format: it surveys and argues across a very wide field instead of establishing a unified quantitative framework or directly comparing alternatives under a common benchmark. Several sections identify open foundations rather than mature design rules.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What systematic co-design framework can map a desired intelligent engineering function onto physical structure, material choice, sensing layout, and computing mechanism while also preserving ordinary mechanical requirements such as strength, dynamics, and robustness?</p>"}, {"citation_key": "Cazalets2025reshaping", "title": "Reshaping Reservoirs with Unsupervised Hebbian Adaptation", "authors": "Cazalets and Dambre", "year": 2025, "paper_type": "simulation", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Cazalets2025reshaping — Reshaping Reservoirs with Unsupervised Hebbian Adaptation</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>The paper proposes Hebbian Architecture Generation, an unsupervised way to reshape reservoir connectivity from data instead of keeping a random graph fixed. Starting from an almost empty network, the method grows connections between units that co-activate, producing task-adapted reservoir structure without gradient training of recurrent weights. The central claim is that structural self-organization can improve reservoir usefulness while preserving the light training philosophy of reservoir computing. This moves adaptation from readout fitting alone into the reservoir architecture itself.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors define a Hebbian connectivity-growth rule and evaluate the resulting reservoirs across time-series classification and forecasting tasks. They compare against standard Echo State Networks and against reservoirs using other adaptation rules such as intrinsic plasticity and Anti-Oja learning. The strongest reported gains appear in classification settings, where the generated structures consistently improve accuracy. Forecasting results are also competitive, but the advantage is less uniform than in classification.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The useful idea is that task exposure can sculpt a reservoir before supervised readout training, rather than treating reservoir topology as a random nuisance parameter. The method appears especially promising when the input distribution contains repeated activation patterns that connectivity can exploit. Its main limitation is that the benefit is not equally strong across all task families, and the paper leaves open how scaling, stability, and architecture growth behave in more constrained physical substrates. The approach is compelling as a design mechanism, but not yet a universal replacement for conventional reservoir tuning.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How well can Hebbian reservoir reshaping survive the wiring, locality, and noise constraints of actual physical reservoir hardware?</p>"}, {"citation_key": "Chen2025physical", "title": "Physical Learning in Reprogrammable Metamaterials for Adaptation to Unknown Environments", "authors": "Chen et al.", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "mechanical-intelligence", "embodied-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Chen2025physical — Physical Learning in Reprogrammable Metamaterials for Adaptation to Unknown Environments</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper demonstrates physical learning in a reprogrammable metamaterial that adapts its stiffness pattern to unknown loading conditions. Rather than learning a purely digital model, the structure updates its own material configuration so that a desired global deformation emerges from local responses. The core contribution is a model-free learning procedure that turns a deformable metamaterial into an adaptive physical system. It positions programmable mechanics as a route to embodied adaptation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors encode target behavior through local strain objectives and iteratively update cell stiffnesses in hardware. Their experiments show autonomous adaptation to unknown loads in fewer than ten update rounds while reaching roughly percent-level shape error under the reported conditions. They also test robustness to sensor noise, structural damage, and fabrication imperfections, and the learning process continues to converge in those settings. The evidence is therefore direct physical adaptation, not only simulation.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that local mechanical programmability can support global behavior learning without requiring a high-fidelity environmental model. This is relevant to mechanical intelligence because adaptation occurs through the body's tunable structure itself. The main limitation is that the demonstrations focus on a bounded class of static deformation goals and load cases. The paper does not yet establish how the approach scales to richer dynamics, multi-objective behaviors, or long-lived autonomous operation.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can the same physical-learning principle be extended from static reconfiguration to dynamic, closed-loop adaptation in changing environments?</p>"}, {"citation_key": "Ding2025physical", "title": "Physical Reservoir Computing for Biomedical Applications", "authors": "Ding et al.", "year": 2025, "paper_type": "review", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "neuromorphic-computing"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Ding2025physical — Physical Reservoir Computing for Biomedical Applications</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This review surveys how physical reservoir computing could support biomedical edge intelligence. It organizes the field around hardware reservoirs, biomedical signal types, readout strategies, and deployment requirements such as latency, energy use, bandwidth, and privacy. The paper's main contribution is a domain-specific map of where PRC is already being applied and where it could matter clinically or in wearables. It connects device physics to application constraints rather than reviewing reservoirs in isolation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors synthesize work on ECG, EEG, EMG, PCG, PPG, and multimodal biosignals together with electronic, photonic, spintronic, and other hardware reservoirs. They discuss how ANN-style and spiking readouts are paired with physical reservoirs in representative biomedical pipelines. The review also compares claimed benefits against practical barriers such as limited hardware maturity, training complexity, and reliability. Its evidence base is literature aggregation across application examples and device demonstrations.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that biomedical PRC is attractive where continuous temporal sensing meets tight power and data-movement budgets. Physical reservoirs may reduce front-end computational burden, but only if the device, readout, and biosignal preprocessing chain are co-designed. The main limitation is that the field remains fragmented, with many proofs of concept but fewer clinically realistic end-to-end demonstrations. The review identifies a direction, not a settled deployment recipe.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What hardware and training stack can make PRC reliable enough for long-duration biomedical use outside carefully controlled laboratory datasets?</p>"}, {"citation_key": "Khairnar2025physical", "title": "Physical Reservoir Computing with Compliant Fiber Networks", "authors": "Khairnar et al.", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "mechanical-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Khairnar2025physical — Physical Reservoir Computing with Compliant Fiber Networks</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper studies compliant fiber networks as mechanical reservoirs inspired by web-like architectures. It argues that distributed deformation, tension, and wave propagation in such networks can provide useful memory and nonlinear processing. The contribution is a combined modeling and physical demonstration of fiber-network PRC. It expands mechanical reservoirs beyond compact bodies and rigidly defined resonators.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors use Cosserat-rod-based simulations to evaluate nonlinear and memory capacities across network choices, then build physical prototypes to test the basic computational behavior experimentally. The work examines how topology, material response, pretension, and network scale affect information processing. Reported experiments show nonlinear transformation and recall-like behavior from the fabricated structure. The simulation and hardware results point in the same direction while also revealing differences that need further explanation.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that sparse compliant networks can act as physically interpretable reservoirs whose computation is distributed through deformation. This makes them interesting for sensing-rich mechanical systems. The main limitation is that scaling trends and quantitative memory behavior do not align perfectly across simulation and experiment, so the design rules are not yet settled. The paper establishes a promising substrate rather than a fully optimized architecture.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Which mechanical parameters most reliably control the memory-versus-nonlinearity profile of fiber-network reservoirs in real fabricated systems?</p>"}, {"citation_key": "Kiyabu2025optomechanical", "title": "Optomechanical Reservoir Computing", "authors": "Kiyabu et al.", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Kiyabu2025optomechanical — Optomechanical Reservoir Computing</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper introduces an optomechanical reservoir that combines nonlinear mechanical dynamics with optical sensing. Its central claim is that different physical subcomponents contribute different orders of useful spectral content, and that this structure can be related to task requirements. The contribution is both a hardware platform and a diagnostic way to reason about why it helps. It treats the reservoir as a compositional physical system rather than as an opaque black box.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors study a spring-based mechanical reservoir read out through optical fibers and analyze its frequency content under benchmark tasks. Ablation studies and novelty search separate the contributions of mechanical nonlinearity and optical sensing pathways. The paper reports that the mechanical component supports second-order content while the optical path introduces additional higher-order content relevant to harder transformations. Experiments validate meaningful task gains even though physical noise reduces idealized performance.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The important lesson is that reservoir capability can be interpreted through which nonlinear spectral features the hardware naturally exposes. This gives a more actionable route to matching tasks with devices. The limitation is that the proposed frequency-content perspective still needs broader validation across architectures and more demanding real-world tasks. The platform is instructive, but the diagnostic framework is not yet a complete universal design law.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can spectral fingerprints predict the best optomechanical reservoir configuration before full task training and hardware experimentation?</p>"}, {"citation_key": "Liu2025physical", "title": "Physical Reservoir Computing for Edge AI Applications", "authors": "Liu et al.", "year": 2025, "paper_type": "review", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "neuromorphic-computing"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Liu2025physical — Physical Reservoir Computing for Edge AI Applications</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This review surveys physical reservoir computing as a candidate architecture for edge AI. It connects the field's device landscape to edge requirements such as power, latency, footprint, and local processing of temporal signals. The contribution is a broad synthesis of how material systems, reservoir structures, and application needs fit together. It positions PRC as a hardware-aware alternative to moving every time-series workload onto conventional digital processors.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors organize work across memristive, photonic, spintronic, ionic, electrochemical, and other device families, along with architectural issues such as heterogeneous integration and scaling. They review application examples and describe how physical reservoirs may reduce data movement or exploit device-native dynamics. The paper also discusses variability, readout training, multimodal use, and commercialization challenges. Its evidence is literature-wide rather than experimental within a single platform.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that edge deployment is one of the clearest practical motivations for PRC because the input signals are already temporal and resource constraints are severe. However, the case for adoption depends on system-level integration, not isolated device novelty. The main limitation is that the reviewed platforms remain uneven in maturity and benchmark comparability. The review clarifies the opportunity while also showing how much engineering consolidation is still missing.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Which physical reservoir technology can deliver a repeatable end-to-end edge advantage once sensing, packaging, training, and deployment constraints are all counted together?</p>"}, {"citation_key": "Matsumura2025phase", "title": "Phase Transitions from Linear to Nonlinear Information Processing in Neural Networks", "authors": "Matsumura and Haga", "year": 2025, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "memory-capacity", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Matsumura2025phase — Phase Transitions from Linear to Nonlinear Information Processing in Neural Networks</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper analyzes when recurrent neural systems shift from primarily linear information processing toward nonlinear processing. It reports a phase-transition-like change in information capacity as reservoir nonlinearity increases in the presence of noise. The central contribution is a statistical-physics style account of how processing character changes in large networks. It separates this transition from the more familiar order-chaos narrative.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors study capacity decompositions in random networks and derive behavior in the thermodynamic limit. They show that processing capacity can jump discontinuously from linear-dominant to nonlinear-dominant regimes, with the critical point controlled by noise strength and task-relevant settings. Numerical experiments accompany the theory and illustrate finite-size behavior. The support is therefore theoretical with computational confirmation.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that memory and nonlinearity are not merely smoothly traded; network processing may reorganize sharply across parameter regimes. This matters for reservoirs because small tuning changes can qualitatively alter what computations are accessible. The limitation is that the work focuses on idealized random network settings, so translation to device-specific physical reservoirs is not automatic. It clarifies mechanism more than application.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Do comparable processing transitions appear in experimentally accessible physical reservoirs, and can they be exploited for task-adaptive tuning?</p>"}, {"citation_key": "OHagan2025confabulation", "title": "Confabulation Dynamics in a Reservoir Computer: Filling in the Gaps with Untrained Attractors", "authors": "O'Hagan et al.", "year": 2025, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>OHagan2025confabulation — Confabulation Dynamics in a Reservoir Computer: Filling in the Gaps with Untrained Attractors</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper studies \"confabulation\" in reservoir computers: the emergence of plausible but untrained attractors after learning dynamical behavior. It argues that these additional attractors are not merely trivial data scarcity artifacts but can arise from the reservoir's learned dynamical geometry. The contribution is a systematic treatment of untrained attractor formation and interpolation-like behavior. It reframes some reservoir failure modes as structured dynamics worth understanding directly.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors analyze tasks involving reconstruction of one or multiple attractors and interpolation between related or unrelated target dynamics. They vary training structure and reservoir settings, then inspect when new attractors appear after learning. The paper reports that more data does not automatically remove confabulation and that attractor count, spacing, and reservoir properties all matter. Its support comes from dynamical-systems analysis and simulation.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that learned reservoirs can invent internally consistent but unintended dynamics, which matters for prediction, control, and generative use. These emergent attractors may sometimes be informative, but they are also a risk when the task demands faithful reconstruction. The main limitation is that the work centers on deliberately structured dynamical examples, so the broader prevalence of confabulation across physical reservoirs is not yet established. The paper sharpens the question more than it closes it.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How can reservoir training detect or constrain unintended attractors without suppressing the representational flexibility that makes recurrent dynamics useful?</p>"}, {"citation_key": "Perkins2025the", "title": "The Mechanical Duffing Adaptive Oscillator Physical Reservoir Computer", "authors": "Perkins", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems", "mechanical-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Perkins2025the — The Mechanical Duffing Adaptive Oscillator Physical Reservoir Computer</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper presents a physical reservoir computer built from a mechanical Duffing adaptive oscillator. The adaptive element learns a resonance-related state that changes the oscillator's response landscape and improves its usefulness for certain signal-processing tasks. The contribution is a concrete hardware route to mechanical reservoir adaptation rather than a purely fixed oscillator reservoir. It highlights how nonlinear mechanics and adaptation can be combined in one compact substrate.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The author analyzes the oscillator's dynamics, contrasts adaptive and nonadaptive behavior, and demonstrates prototype operation on reservoir tasks including NARMA-style benchmarks. The adaptive mechanism reduces unfavorable low-amplitude or hysteresis-like operating regions under the reported conditions. The paper also discusses signal-processing use cases and the potential relevance of stochastic resonance and smaller-scale realizations. Its support includes physical demonstration plus dynamical analysis.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that mechanical reservoirs can benefit from slow internal adaptation that reshapes their dynamic operating regime before or during computation. This opens a route beyond static passive mechanics. The limitation is that the system is still a specialized oscillator platform, and the advantage relative to other adaptive physical reservoirs is not yet benchmarked broadly. The paper is a promising hardware case study rather than a general mechanical RC template.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can adaptive oscillator reservoirs scale into multi-degree-of-freedom mechanical systems while preserving the controllability that makes the single-device prototype understandable?</p>"}, {"citation_key": "Terajima2025multifunctional", "title": "Multifunctional Physical Reservoir Computing in Soft Tensegrity Robots", "authors": "Terajima et al.", "year": 2025, "paper_type": "simulation", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "soft-robotics", "embodied-intelligence", "robot-learning", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Terajima2025multifunctional — Multifunctional Physical Reservoir Computing in Soft Tensegrity Robots</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper studies multifunctional physical reservoir computing in soft tensegrity robots. It argues that one body-environment system can support several learned behaviors and attractor-like operating modes when used as a reservoir. The contribution is a dynamical account of multifunctionality, including behavior retrieval and the appearance of untrained attractors. It expands embodied PRC from single-task control toward richer behavioral repertoires.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors simulate tensegrity robots and train readouts so the same physical reservoir supports multiple target attractors or behaviors. They analyze basins of attraction, multistability, and how initial conditions or internal state can retrieve different learned patterns. The study also identifies untrained attractors that arise from the learned closed-loop system. The evidence is numerical but directly focused on embodied robot dynamics.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that body dynamics can host more than one learned mode, which makes physical reservoirs relevant to adaptive embodied control rather than one-off pattern generation. At the same time, multistability introduces ambiguity because unintended attractors may appear. The main limitation is that the study is simulation-based and does not yet show the same repertoire on hardware subject to real-world disturbances. It establishes a useful dynamical picture that still needs experimental grounding.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How can embodied reservoirs support multiple useful behaviors while suppressing or exploiting the unintended attractors that appear between them?</p>"}, {"citation_key": "Terasaki2025thermodynamic", "title": "Thermodynamic Limit in Learning Period Three", "authors": "Terasaki and Nakajima", "year": 2025, "paper_type": "theory", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "dynamical-systems"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Terasaki2025thermodynamic — Thermodynamic Limit in Learning Period Three</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper analyzes how random recurrent systems learn a period-three target in the thermodynamic limit. It shows that learning can reshape the attractor landscape in ways that create unstable learned periods, additional untrained attractors, and rich post-learning bifurcation structure. The contribution is a theoretical account of how recurrent learning externalizes dynamical complexity. It also connects naturally to broader reservoir questions about attractor embedding and confabulation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors study a large-network limit, derive analytical structure for learned period-three behavior, and trace how attractors change after training. They report that post-learning bifurcations can generate many additional periodic behaviors, potentially extending beyond the directly trained target. The analysis is supported by numerical illustrations of the resulting attractor structure. The paper is primarily theoretical rather than application-oriented.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that recurrent learning can reorganize dynamical systems far beyond the nominal target it was trained on. That matters when reservoirs are used to embed or reproduce attractors. The main limitation is that the paper studies a deliberately stylized target and mathematical limit, so its direct implications for practical physical reservoirs remain indirect. It is a strong mechanism paper, not a deployment paper.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Which aspects of this post-learning attractor proliferation persist in finite, noisy, experimentally realized reservoir systems?</p>"}, {"citation_key": "Wang2025autonomous", "title": "Autonomous Codesign and Fabrication of Multistimuli-Responsive Material Systems", "authors": "Wang et al.", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "mechanical-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Wang2025autonomous — Autonomous Codesign and Fabrication of Multistimuli-Responsive Material Systems</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper presents an autonomous codesign workflow for material systems that morph under multiple stimuli. Although it is broader than reservoir computing, it belongs naturally in a mechanical-intelligence library because it couples physical embodiment, optimization, and fabricated adaptive behavior. The contribution is a pipeline that links inverse design, differentiable hybrid modeling, and multimaterial fabrication. It shows how desired functional responses can be embedded into structure rather than imposed only through external control.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors combine topology-style design optimization with a hybrid physics and data model, then validate resulting concepts in fabricated liquid-crystal-elastomer-based structures. The demonstrations cover thermo-responsive, photo-responsive, and combined multi-stimulus morphing targets. Reported experiments show that the fabricated systems follow the intended qualitative behaviors and support the codesign premise. The evidence is an integrated design-to-hardware workflow.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that future intelligent material systems may be designed end to end around targeted stimulus-response behavior rather than tuned manually through repeated fabrication cycles. This is closely aligned with embodied mechanical intelligence even if it is not a canonical PRC paper. The main limitation is that the workflow targets morphing performance more directly than general temporal information processing. Its relevance to reservoir computing is conceptual and adjacent, not one-to-one.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can autonomous material codesign be extended to optimize not only target shapes, but also reservoir-style computational properties such as memory, nonlinearity, and readout separability?</p>"}, {"citation_key": "Wang2025embodied", "title": "Embodied Multi-Modal Sensing with a Soft Modular Arm Powered by Physical Reservoir Computing", "authors": "Wang and Li", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "soft-robotics", "embodied-intelligence", "robot-learning"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Wang2025embodied — Embodied Multi-Modal Sensing with a Soft Modular Arm Powered by Physical Reservoir Computing</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper demonstrates multimodal sensing in a soft modular arm using the arm's own dynamics as a physical reservoir. It addresses body posture, payload weight, payload orientation, and related perception tasks from shared dynamical state data. The contribution is a richer embodied-sensing pipeline than single-output PRC demonstrations. It shows how one compliant structure can support several inference channels relevant to manipulation.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors train task-specific readouts over the soft arm's measured responses and organize the system into a multi-task perception workflow. They report strong performance on orientation classification and fine discrimination between similar payload conditions under the studied setups, along with sensor-count tradeoffs. The experiments indicate that the same body dynamics can feed multiple sensing decisions without rebuilding the underlying physical substrate. The evidence is hardware-based and task varied.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that physical reservoirs in soft robots can support perception stacks, not just isolated benchmark predictions. This is relevant for robots that need to infer both their own state and external loads from compact onboard sensing. The limitation is that task breadth still depends on measured state richness, and performance may degrade as environments become less controlled than the experimental conditions. The paper expands capability, but also raises scaling questions for real deployments.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>How much multimodal sensing capacity can a single soft-body reservoir support before tasks begin to interfere or demand separate sensing channels?</p>"}, {"citation_key": "Wang2025re", "title": "Re-Purposing a Modular Origami Manipulator Into an Adaptive Physical Computer for Machine Learning and Robotic Perception", "authors": "Wang and Li", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "mechanical-intelligence", "embodied-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Wang2025re — Re-Purposing a Modular Origami Manipulator Into an Adaptive Physical Computer for Machine Learning and Robotic Perception</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper repurposes a modular origami manipulator into an adaptive physical computer for machine learning and robotic perception. It argues that changing the manipulator's bistable configuration alters the reservoir state space and can improve different downstream tasks. The contribution is an embodied reservoir whose mechanical configuration becomes a task-tuning mechanism. It ties adaptive structure to both benchmark computation and perception tasks.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors evaluate the origami system on NARMA-style emulation, payload estimation, payload orientation inference, and input reconstruction. Different structural configurations produce different task advantages, demonstrating that the physical kernel is not computationally fixed. The experiments show a tradeoff between configurations optimized for generic temporal computation and those better suited to perception. The evidence is physical and comparative across several tasks.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The key takeaway is that morphology can become a reprogrammable hyperparameter of embodied computing. A single manipulator need not use one configuration for every task if its geometry can be retuned. The main limitation is that the right configuration remains task dependent, and the paper does not yet provide a fully autonomous method for deciding which physical state to select. It demonstrates adaptivity, but not closed-loop self-optimization.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can adaptive mechanical reservoirs choose their own configuration online from task feedback instead of relying on offline comparison across candidate morphologies?</p>"}, {"citation_key": "Wringe2025reservoir", "title": "Reservoir Computing Benchmarks: A Tutorial Review and Critique", "authors": "Wringe et al.", "year": 2025, "paper_type": "review", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "reservoir-computing", "memory-capacity"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Wringe2025reservoir — Reservoir Computing Benchmarks: A Tutorial Review and Critique</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This review and critique examines the benchmark culture of reservoir computing. It argues that benchmark choice, variant definition, reporting practice, and baseline selection materially affect the claims researchers draw about reservoir quality. The contribution is a methodological audit of how RC tasks are used and misused. It is especially relevant to physical RC, where small implementation differences can already make comparisons difficult.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors organize common benchmark families, discuss memory-capacity measures, and identify ambiguities in tasks such as NARMA when versions are not specified cleanly. They emphasize reproducibility, comparator choice, and the need to separate task success from general reservoir characterization. The paper aggregates examples from the literature to show how loosely reported protocols can undermine interpretation. Its evidence is critical synthesis rather than new device experiments.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that RC benchmarking must be explicit enough to survive replication and fair comparison. A benchmark number without protocol detail can be less informative than it appears. The main limitation is that methodological critique alone cannot supply one perfect universal benchmark suite for every substrate. The paper raises the reporting standard, while the field still needs consensus infrastructure.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>What minimal benchmark package and reporting template would let physical-reservoir papers remain comparable without flattening legitimate substrate-specific goals?</p>"}, {"citation_key": "Zhang2025in", "title": "In-Memory Phononic Learning Toward Cognitive Mechanical Intelligence", "authors": "Zhang and Wang", "year": 2025, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-reservoir-computing", "mechanical-intelligence", "embodied-intelligence"], "topic": "Physical Reservoir Computing", "body_html": "<h2>Zhang2025in — In-Memory Phononic Learning Toward Cognitive Mechanical Intelligence</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper introduces in-memory phononic learning, a mechanical-intelligence framework that couples nonvolatile mechanical memory to wave-based perception in one metastructure. Stored structural states reshape elastic-wave propagation, allowing the system to classify patterns through physically interpretable frequency-selective behavior. The contribution is a unified memory-and-processing architecture inside the mechanical domain. It aims to move beyond opaque black-box mechanical learning toward transparent, structure-linked inference.</p>\n<br>\n<h3>2. Method / mechanism / evidence</h3>\n<br>\n<p>The authors use a multistable phononic metastructure whose stored states alter bandgaps and localized wave responses. They optimize input waveforms so the output wave energy discriminates among stored geometric patterns, then extend the demonstrations numerically to handwritten-digit-like classification. The paper reports high-accuracy pattern recognition across several exemplars with experimental and simulation support. Its evidence is a combined physical and computational study of the proposed mechanism.</p>\n<br>\n<h3>3. Key takeaway and limitation</h3>\n<br>\n<p>The main takeaway is that mechanical memory and mechanical perception can be coupled directly rather than linked only through external digital interpretation. This gives the resulting intelligence a clearer physical basis and a plausible path toward resilience in harsh settings. The main limitation is that the demonstrated learning tasks remain curated, and the broader scalability of waveform optimization and memory capacity is still open. The work is conceptually ambitious and experimentally grounded, but not yet a general-purpose mechanical learner.</p>\n<br>\n<h3>4. Open question</h3>\n<br>\n<p>Can in-memory phononic learning scale to larger vocabularies and adaptive retraining while retaining the interpretability that motivates the framework?</p>"}, {"citation_key": "Zheng2024single", "title": "Single-Step Precision Programming of Decoupled Multiresponsive Soft Millirobots", "authors": "Zheng et al.", "year": 2024, "paper_type": "experiment", "read_status": "skimmed", "tags": ["physical-intelligence", "soft-robotics", "mechanical-intelligence", "embodied-intelligence"], "topic": "Physical Intelligence", "body_html": "<h2>Zheng2024single — Single-Step Precision Programming of Decoupled Multiresponsive Soft Millirobots</h2>\n<br>\n<h3>1. Core contribution</h3>\n<br>\n<p>This paper introduces a single-step fabrication strategy for soft millirobots whose shape changes can be programmed precisely and decoupled across multiple environmental stimuli. By combining multilayer elastomer structures
